<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- White = visible page, Black = cut out of the page -->
    <mask id="pageCut" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="64" height="64" fill="white"/>

      <!-- Cut out the pencil area (same transform + path) -->
      <path transform="translate(21 -9) scale(3.5)"
            d="m9.293 3.293-8 8A.997.997 0 0 0 1 12v3h3c.265 0 .52-.105.707-.293l8-8-3.414-3.414zM4 14H3v-1H2v-1l1-1 2 2-1 1z"/>
    </mask>
  </defs>

  <!-- Page (with the cutout mask applied) -->
  <path fill="var(--icon-color-accent, #ff8700)" id="page"
        transform="translate(-1 0) scale(1)"
        mask="url(#pageCut)"
        d="M44 25.66V48H20V16h14.34M36 12H18c-1.1 0-2 .9-2 2v36c0 1.1.9 2 2 2h28c1.1 0 2-.9 2-2V24L36 12Z"/>

  <!-- Pencil on top -->
  <path fill="currentColor" id="pencil"
        transform="translate(24 10.5) scale(2)"
        d="m9.293 3.293-8 8A.997.997 0 0 0 1 12v3h3c.265 0 .52-.105.707-.293l8-8-3.414-3.414zM8.999 5l.5.5-5 5-.5-.5 5-5zM4 14H3v-1H2v-1l1-1 2 2-1 1z"/>

  <path fill="currentColor" id="eraser"
        transform="translate(24 10.5) scale(2)"
        d="M13.707 5.707l1.354-1.354a.5.5 0 0 0 0-.707L12.354.939a.5.5 0 0 0-.707 0l-1.354 1.354 3.414 3.414z"/>
</svg>
